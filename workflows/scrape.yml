name: scrape

on:
  schedule:
    # 3x/day at 06:00, 12:00, 18:00 UTC. Cron is UTC and may be delayed a few
    # minutes under load. Adjust hours for your timezone if you like.
    - cron: "0 6,12,18 * * *"
  workflow_dispatch: {} # lets you trigger a run manually from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2 # installs Go from mise.toml
      - run: mise run run
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
